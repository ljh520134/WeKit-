name: CI

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - 'renovate.json'
      - '.editorconfig'
      - '.gitignore'
      - '.idea/**'
      - '**/*.js'
  pull_request:
    branches:
      - master
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - 'renovate.json'
      - '.editorconfig'
      - '.gitignore'
      - '.idea/**'
      - '**/*.js'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
    if: |
      github.event_name == 'workflow_dispatch' || 
      (
        !startsWith(github.event.head_commit.message, '[skip ci]') && 
        (github.ref == 'refs/heads/master' || github.event_name == 'pull_request')
      )
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: aarch64-linux-android,x86_64-linux-android,armv7-linux-androideabi,i686-linux-android

      - name: Cache Rust build cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            app/src/main/rust/wekit-native/target
          key: rust-build-cache

      - name: Cache Gradle build cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/configuration-cache
          key: gradle-build-cache

      - name: Install system dependencies
        run: |
          sudo apt install -y gcc-multilib

      # 修复：统一处理密钥，无论有没有正式密钥都构建 Release
      - name: Prepare keystore
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "Using release keystore"
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $RUNNER_TEMP/wekit-keystore.jks
          else
            echo "No release keystore, will use debug keystore"
            mkdir -p ~/.android
            keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

      # 修复：统一使用 assembleRelease，体积更小且有签名
      - name: Build Release APK
        env:
          WEKIT_KEYSTORE_FILE: ${{ env.KEYSTORE_BASE64 != '' && format('{0}/wekit-keystore.jks', runner.temp) || '' }}
          WEKIT_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          WEKIT_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          WEKIT_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --warning-mode all --stacktrace

      - name: Upload Release
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v7
        with:
          name: wekit-apk
          path: |
            app/build/outputs/apk/release/*.apk

  upload-telegram:
    needs: build
    runs-on: ubuntu-latest
    if: success() && github.ref == 'refs/heads/master'

    services:
      telegram-bot-api:
        image: aiogram/telegram-bot-api:latest
        env:
          TELEGRAM_API_ID: "21724"
          TELEGRAM_API_HASH: "3e0cb5efcd52300aec5994fdfc5bdc16"
          TELEGRAM_STATISTICS: 1
        ports:
          - 8081:8081

    steps:
      - name: Check Telegram Token
        id: check_token
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: |
          if [ -n "$TELEGRAM_TOKEN" ]; then
            echo "has_token=true" >> $GITHUB_OUTPUT
          else
            echo "has_token=false" >> $GITHUB_OUTPUT
            echo "警告: TELEGRAM_TOKEN 未设置，跳过 Telegram 上传"
          fi

      - name: Download APK artifact
        if: steps.check_token.outputs.has_token == 'true'
        uses: actions/download-artifact@v8
        with:
          name: wekit-apk
          path: artifacts

      - name: Wait for Telegram API
        if: steps.check_token.outputs.has_token == 'true'
        run: |
          until curl -s http://localhost:8081 > /dev/null; do
          echo "Waiting for Telegram API server..."
          sleep 1
          done

      - name: Send APKs via Telegram API
        if: steps.check_token.outputs.has_token == 'true'
        env:
          BOT_TOKEN:     ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID:       ${{ secrets.TELEGRAM_CHAT_ID }}
          SHA:           ${{ github.sha }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name || github.actor }}
          REPO:          ${{ github.repository }}
        run: |
          caption="🎉 *检测到新的 GitHub 推送！*
          *Commit SHA:* \`${SHA}\`
          \`\`\`
          ${{ github.event.head_commit.message || 'Manual Build' }}
          \`\`\`
          *提交者* \`${COMMIT_AUTHOR}\`
          [查看详情](https://github.com/${REPO}/commit/${SHA})"
          
          apks=(artifacts/*.apk)
          
          echo $apks
          
          if [ ${#apks[@]} -eq 1 ]; then
            curl -s -X POST "http://localhost:8081/bot${BOT_TOKEN}/sendDocument" \
              -F chat_id="${CHAT_ID}" \
              -F document=@"${apks[0]}" \
              -F caption="${caption}" \
              -F parse_mode=Markdown
          else
            media_json="["
            form_args=()
            for i in "${!apks[@]}"; do
              apk="${apks[$i]}"
              name="apk${i}"
              form_args+=(-F "${name}=@${apk}")
          
              if [ $i -gt 0 ]; then media_json+=","; fi
          
              if [ $i -eq $(( ${#apks[@]} - 1 )) ]; then
                media_json+="{\"type\":\"document\",\"media\":\"attach://${name}\",\"caption\":\"${caption}\",\"parse_mode\":\"Markdown\"}"
              else
                media_json+="{\"type\":\"document\",\"media\":\"attach://${name}\"}"
              fi
            done
            media_json+="]"
          
            echo $media_json
          
            curl -s -X POST "http://localhost:8081/bot${BOT_TOKEN}/sendMediaGroup" \
              -F chat_id="${CHAT_ID}" \
              -F media="${media_json}" \
              "${form_args[@]}"
          fi
